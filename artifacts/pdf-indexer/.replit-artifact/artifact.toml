kind = "web"
previewPath = "/"
title = "PDF Indexer"
version = "1.0.0"
id = "artifacts/pdf-indexer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23735

[services.development]
run = "pnpm --filter @workspace/pdf-indexer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-indexer", "run", "build" ]
publicDir = "artifacts/pdf-indexer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23735"
BASE_PATH = "/"
